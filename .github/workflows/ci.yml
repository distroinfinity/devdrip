name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build

      - name: hermetic test
        run: pnpm test
        env:
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3002
          JWT_SECRET: ci-test-secret-000000000000000000000000000000000000000000000000000000
          NODE_ENV: test

      - name: integration test
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]') }}
        run: pnpm test:integration
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3002
          JWT_SECRET: ci-test-secret-000000000000000000000000000000000000000000000000000000
          NODE_ENV: test
          DB_TARGET: neon
