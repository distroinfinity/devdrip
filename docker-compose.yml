name: devdrip-dev

# all runtime values come from the repo-root .env (gitignored). .env.example
# documents the expected shape. setup-worktree.sh --db-up bootstraps .env from
# local-only defaults if it's missing.

services:
  postgres:
    image: postgres:16-alpine
    container_name: devdrip-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - devdrip-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  devdrip-pg-data:
