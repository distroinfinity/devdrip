name: Deploy Frontend

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy frontend → vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: validate vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing required GitHub secret: VERCEL_TOKEN"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Missing required GitHub secret: VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing required GitHub secret: VERCEL_PROJECT_ID_DASHBOARD"; exit 1; }
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

      - name: install vercel cli
        run: npm install -g vercel

      - name: pull vercel project settings
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

      - name: build frontend with vercel
        run: vercel build --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

      - name: deploy prebuilt output to vercel
        run: vercel deploy --prebuilt --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
