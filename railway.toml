[build]
builder = "nixpacks"
# install/build/start phases live in nixpacks.toml so we can override the
# default whole-monorepo install (which pulls CLI's better-sqlite3 and fails).
watchPatterns = ["packages/api/**", "packages/shared/**", "nixpacks.toml"]

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
