name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  release:
    name: build + publish github release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build cli
        run: pnpm turbo run build --filter=@distrotv/cli

      - name: verify build artifact
        run: test -f packages/cli/dist/index.js

      - name: stage release contents
        run: |
          mkdir -p .release-staging
          cp -R packages/cli/dist .release-staging/
          cp packages/cli/package.json .release-staging/
          cp packages/cli/LICENSE .release-staging/
          test -f packages/cli/README.md && cp packages/cli/README.md .release-staging/ || true

      - name: pack tarball
        run: tar -czf distrotv-cli.tar.gz -C .release-staging .

      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" distrotv-cli.tar.gz \
            --title "CLI ${GITHUB_REF_NAME}" \
            --notes "Built from $(git rev-parse --short HEAD)."
