name: Deploy Dashboard

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy dashboard → vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: install vercel cli
        run: npm install -g vercel

      # vercel handles its own build caching — no need for path filtering
      # (which was buggy on multi-commit pushes with head_sha~1 diffing)
      - name: deploy to vercel
        working-directory: packages/dashboard
        run: vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
