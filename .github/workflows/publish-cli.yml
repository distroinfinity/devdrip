name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: publish @devdrip/cli → npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm turbo run build --filter=@devdrip/cli

      - name: verify dist
        run: test -f packages/cli/dist/index.js

      - name: publish
        if: ${{ !inputs.dry_run }}
        run: pnpm publish --filter=@devdrip/cli --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: dry run
        if: ${{ inputs.dry_run }}
        run: pnpm publish --filter=@devdrip/cli --access public --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
